name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Check formatting
        run: uv run --no-sync ruff format --check .

      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Type check
        run: uv run --no-sync mypy src tests

      - name: Build docs
        run: uv run --no-sync mkdocs build --strict

      - name: Build package distributions
        run: uv build

      - name: Check package metadata
        run: uv run --no-sync twine check dist/*

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            django-version: "Django>=4.2,<4.3"
          - python-version: "3.11"
            django-version: "Django>=4.2,<4.3"
          - python-version: "3.12"
            django-version: "Django>=4.2,<4.3"
          - python-version: "3.10"
            django-version: "Django>=5.0,<5.1"
          - python-version: "3.11"
            django-version: "Django>=5.0,<5.1"
          - python-version: "3.12"
            django-version: "Django>=5.0,<5.1"
          - python-version: "3.10"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.11"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.12"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.13"
            django-version: "Django>=5.1,<5.2"
          - python-version: "3.10"
            django-version: "Django>=5.2,<5.3"
          - python-version: "3.11"
            django-version: "Django>=5.2,<5.3"
          - python-version: "3.12"
            django-version: "Django>=5.2,<5.3"
          - python-version: "3.13"
            django-version: "Django>=5.2,<5.3"
          - python-version: "3.14"
            django-version: "Django>=5.2,<5.3"
          - python-version: "3.12"
            django-version: "Django>=6.0,<6.1"
          - python-version: "3.13"
            django-version: "Django>=6.0,<6.1"
          - python-version: "3.14"
            django-version: "Django>=6.0,<6.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install --python .venv --group dev -e . '${{ matrix.django-version }}'

      - name: Run tests
        run: uv run --no-sync pytest -q
