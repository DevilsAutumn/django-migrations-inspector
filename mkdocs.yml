site_name: Django Migration Inspector
site_description: migration safety toolkit for Django.
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: readthedocs

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - Visualization: visualization.md
  - Development: development.md
